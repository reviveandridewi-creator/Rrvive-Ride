<style>
body {
  font-family: 'Poppins', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}
header {
  text-align:center;
  padding:20px;
}
header img {
  max-width:220px;
}
.section {
  max-width:1000px;
  margin:auto;
  padding:20px;
}
h2 {
  border-left:4px solid #3b82f6;
  padding-left:10px;
  margin-bottom:10px;
}
h3 { margin-top:0; }
p { margin:5px 0; }

.grid {
  display:grid;
  gap:15px;
}
@media(min-width:700px){
  .grid { grid-template-columns:1fr 1fr; }
}
.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  transition:0.3s;
  cursor:pointer;
}
.card:hover {
  transform:scale(1.03);
  box-shadow:0 0 12px #3b82f6;
}
.tile-group {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-top:10px;
}
.tile {
  flex:1 1 45%;
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}
.tile:hover:not(.disabled){
  transform:scale(1.05);
  box-shadow:0 0 12px #3b82f6;
}
.tile.selected {
  background:#3b82f6;
}
.tile.disabled {
  background:#555;
  cursor:not-allowed;
}
.tile h4 {
  margin:0;
  margin-bottom:5px;
  font-size:16px;
}
.tile p {
  margin:0;
  font-size:13px;
  color:#cbd5e1;
}
